name: Auto Release

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [Android, Windows]
        include:
          - target: Android
            os: ubuntu-latest
          - target: Windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        if: matrix.target == 'Android'
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      # Android Specific Setup
      - name: Decode Keystore
        if: matrix.target == 'Android'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        if: matrix.target == 'Android'
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Setup Gradle
        if: matrix.target == 'Android'
        uses: gradle/actions/setup-gradle@v3

      # Build Commands
      - name: Build Android
        if: matrix.target == 'Android'
        run: flutter build apk --release --build-name="${{ github.run_number }}.0.0" --build-number=${{ github.run_number }}

      - name: Build Windows
        if: matrix.target == 'Windows'
        run: flutter build windows --release --build-name="${{ github.run_number }}.0.0" --build-number=${{ github.run_number }}

      # Package Windows (Zip the Release folder)
      - name: Package Windows
        if: matrix.target == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/ye-tracker-windows.zip

      # Upload Artifacts (Temporary storage to share between jobs if needed, or just for record)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: ${{ matrix.target == 'Android' && 'build/app/outputs/flutter-apk/app-release.apk' || 'build/ye-tracker-windows.zip' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: Android-release
          path: artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-release
          path: artifacts

      - name: Generate Release Notes
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --format="- %s (%h)" > release_notes.txt
          else
            git log --format="- %s (%h)" $LAST_TAG..HEAD > release_notes.txt
          fi
          if [ ! -s release_notes.txt ]; then
            echo "- Maintenance release" > release_notes.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body_path: release_notes.txt
          files: |
            artifacts/app-release.apk
            artifacts/ye-tracker-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}